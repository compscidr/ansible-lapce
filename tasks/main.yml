---
# tasks for installing lapce on Ubuntu 22.04
- name: Ensure required directories exist
  become: true
  tags: lapce
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /usr/share/pixmaps
    - /usr/share/applications
    - /usr/share/metainfo

- name: Download and install lapce binary
  become: true
  tags: lapce
  ansible.builtin.unarchive:
    src: "https://github.com/lapce/lapce/releases/download/{{ lapce_version }}/lapce-linux-amd64.tar.gz"
    remote_src: true
    extra_opts: ['--strip-components=1', '--show-stored-names']
    dest: /usr/bin

- name: Install logo for lapce launcher icon
  become: true
  tags: lapce
  ansible.builtin.copy:
    src: dev.lapce.lapce.png
    dest: /usr/share/pixmaps/dev.lapce.lapce.png
    mode: '644'

- name: Install desktop file for lapce launcher
  become: true
  tags: lapce
  ansible.builtin.copy:
    src: dev.lapce.lapce.desktop
    dest: /usr/share/applications/dev.lapce.lapce.desktop
    mode: '644'

- name: Install metainfo file for lapce launcher
  become: true
  tags: lapce
  ansible.builtin.copy:
    src: dev.lapce.lapce.metainfo.xml
    dest: /usr/share/metainfo/dev.lapce.lapce.metainfo.xml
    mode: '644'
